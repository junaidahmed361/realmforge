project:
  name: hf_ebwm
  seed: 42

paths:
  raw_root: data/mimiciv
  processed_root: data/processed
  artifacts_root: outputs

cohort:
  min_age: 18
  min_los_hours: 24
  icd9_prefixes: ["428"]
  icd10_prefixes: ["I50"]
  split:
    train: 0.7
    val: 0.15
    test: 0.15
  split_key: subject_id

time_windows:
  size_hours: 6
  max_gap_hours: 48

tokenizer:
  include_notes: false
  numeric_lab_bins: 32
  numeric_vital_bins: 32

model:
  latent_dim: 128
  encoder_hidden: 256
  n_heads: 4
  n_layers: 4

training:
  batch_size: 128
  num_workers: 8
  lr: 3.0e-4
  weight_decay: 1.0e-4
  max_epochs: 20

rollout:
  default_horizon: 8
  n_samples: 64

serving:
  max_batch_rollouts: 4096
  async_workers: 2
  enable_torch_compile: false
